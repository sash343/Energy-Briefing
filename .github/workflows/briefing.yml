name: Morning Energy Briefing on: schedule: - cron: '0 12 * * 1-5' workflow_dispatch: jobs: send-briefing: runs-on: ubuntu-latest steps: - uses: actions/checkout@v4 - uses: actions/setup-python@v5 with: python-version: '3.11' - run: pip install -r requirements.txt - run: python briefing.py env: ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }} TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }} TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }} RECIPIENT_1: ${{ secrets.RECIPIENT_1 }} RECIPIENT_2: ${{ secrets.RECIPIENT_2 }} RECIPIENT_3: ${{ secrets.RECIPIENT_3 }} RECIPIENT_4: ${{ secrets.RECIPIENT_4 }} RECIPIENT_5: ${{ secrets.RECIPIENT_5 }}
